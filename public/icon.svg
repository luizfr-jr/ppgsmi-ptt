<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded background in ninma-purple -->
  <rect width="32" height="32" rx="7" fill="#756fb3"/>

  <!-- Arc of dots: teal → orange → pink (top-left to top-right, like the logo) -->
  <circle cx="7"  cy="13" r="3"   fill="#5fc3ad"/>
  <circle cx="14" cy="8"  r="2.5" fill="#f9a870"/>
  <circle cx="22" cy="6"  r="2"   fill="#f05a72"/>

  <!-- Bold white "nM" -->
  <text
    x="3" y="28"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17"
    font-weight="900"
    fill="white"
    letter-spacing="-1"
  >nM</text>
</svg>
